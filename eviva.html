<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eviva — MoonLeaf Studio</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Eviva — an interactive UI mockup of the calm, private pregnancy & parenthood companion from MoonLeaf Studio.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">

<!-- React + Babel from CDN (no build step) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
:root{
  --cream:#FFF6F1;
  --coral:#F4796B;
  --coral-deep:#E15B6A;
  --coral-soft:#FFE5DE;
  --plum:#3B2E37;
  --lavender:#C9B7F0;
  --lavender-soft:#EFE9FC;
  --mint:#A7E0C4;
  --mint-soft:#E2F6EC;
  --surface:#FFFFFF;
  --muted:#8C7F84;
  --line:#F0E3DC;
  --shadow:0 14px 34px -12px rgba(225,91,106,.28);
  --shadow-soft:0 10px 26px -14px rgba(59,46,55,.22);
  --r-lg:28px;
  --r-md:22px;
  --display:"Nunito",system-ui,sans-serif;
  --body:"DM Sans",system-ui,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(900px 520px at 80% -10%,#FBE3DD,transparent 60%),
    radial-gradient(760px 480px at 0% 8%,#EFE9FC,transparent 55%),
    #F6EEF0;
  color:var(--plum);
  font-family:var(--body);
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2.5px solid var(--coral-deep);outline-offset:2px;border-radius:12px}
::selection{background:var(--coral);color:#fff}

/* back-to-site bar (not part of the mockup) */
.site-back{
  position:fixed;top:16px;left:16px;z-index:60;
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.86);backdrop-filter:blur(10px);
  color:var(--coral-deep);font-weight:700;font-size:13px;
  font-family:var(--display);
  padding:9px 15px;border-radius:999px;text-decoration:none;
  box-shadow:var(--shadow-soft);
  transition:transform .25s ease, box-shadow .25s ease;
}
.site-back:hover{transform:translateY(-2px)}

/* ---------- phone shell ---------- */
.stage{min-height:100vh;display:grid;place-items:center;padding:34px 16px}
.phone{
  width:100%;max-width:412px;height:min(860px,calc(100vh - 56px));
  background:var(--cream);
  border-radius:46px;position:relative;overflow:hidden;
  box-shadow:0 60px 120px -40px rgba(59,46,55,.5),0 0 0 11px #2a2026,0 0 0 12px rgba(255,255,255,.06);
  display:flex;flex-direction:column;
}
.island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:96px;height:26px;background:#221a20;border-radius:999px;z-index:30}
.viewport{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:96px}
.viewport::-webkit-scrollbar{display:none}
.screen{padding:54px 20px 8px;animation:rise .45s cubic-bezier(.22,.61,.36,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ---------- typography ---------- */
h1,h2,h3,h4{font-family:var(--display);letter-spacing:-.01em;line-height:1.1}
.title{font-size:30px;font-weight:800;margin-bottom:18px}
.muted{color:var(--muted)}
.eyebrow{font-family:var(--display);font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--coral-deep)}

/* ---------- header ---------- */
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.top .hello{font-size:13.5px;color:var(--muted);font-weight:500}
.top .name{font-family:var(--display);font-weight:800;font-size:26px;margin-top:2px}
.avatar{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;font-size:22px;
  background:radial-gradient(circle at 35% 30%,#FFE3D6,#F7B4AC);box-shadow:var(--shadow-soft)}

/* ---------- insight stories ---------- */
.stories{display:flex;gap:14px;overflow-x:auto;padding:2px 2px 14px;margin:0 -20px 6px;padding-left:20px;padding-right:20px;scrollbar-width:none}
.stories::-webkit-scrollbar{display:none}
.story{flex:none;width:64px;text-align:center}
.story .ring{width:60px;height:60px;border-radius:50%;padding:3px;margin:0 auto 6px;
  display:grid;place-items:center;background:conic-gradient(var(--coral),var(--lavender),var(--mint),var(--coral))}
.story .face{width:100%;height:100%;border-radius:50%;background:var(--surface);display:grid;place-items:center;font-size:22px}
.story span{font-size:11px;color:var(--muted);font-weight:500;display:block;line-height:1.2}

/* ---------- cards ---------- */
.card{background:var(--surface);border-radius:var(--r-md);padding:18px;box-shadow:var(--shadow-soft);margin-bottom:14px}
.tap{cursor:pointer;transition:transform .25s ease, box-shadow .25s ease}
.tap:active{transform:scale(.985)}

/* week hero */
.hero{background:linear-gradient(150deg,#FFFFFF 0%,#FFEDE7 100%);border-radius:var(--r-lg);
  padding:22px;box-shadow:var(--shadow);margin-bottom:18px;position:relative;overflow:hidden}
.hero .pill{display:inline-flex;align-items:center;gap:6px;background:var(--coral);color:#fff;
  font-family:var(--display);font-weight:800;font-size:12px;padding:6px 12px;border-radius:999px}
.hero-row{display:flex;align-items:center;gap:18px;margin-top:6px}
.hero-copy{flex:1;min-width:0}
.hero-copy h2{font-size:21px;font-weight:800;margin:10px 0 4px}
.hero-copy p{font-size:13px;color:var(--muted)}
.btn{border:none;background:var(--coral);color:#fff;font-family:var(--display);font-weight:800;
  font-size:14px;padding:13px 18px;border-radius:16px;box-shadow:0 10px 22px -10px rgba(225,91,106,.7);
  transition:transform .25s ease, box-shadow .25s ease;display:inline-flex;align-items:center;gap:8px}
.btn:hover{transform:translateY(-2px)}
.btn.block{width:100%;justify-content:center;margin-top:14px}
.btn.ghost{background:var(--surface);color:var(--coral-deep);box-shadow:var(--shadow-soft)}

/* baby ring */
.ring-wrap{position:relative;flex:none;display:grid;place-items:center}
.ring-wrap .label{position:absolute;text-align:center;font-family:var(--display)}
.ring-wrap .label b{display:block;font-size:28px;font-weight:900;line-height:1;color:var(--plum)}
.ring-wrap .label small{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

/* content feed */
.feed-card{display:flex;align-items:center;gap:14px}
.cover{width:54px;height:54px;border-radius:16px;flex:none;display:grid;place-items:center}
.feed-card h3{font-size:15.5px;font-weight:800}
.feed-card p{font-size:12.5px;color:var(--muted);margin-top:2px}
.chev{margin-left:auto;color:var(--muted)}

/* section heads */
.sec-h{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 12px}
.sec-h h3{font-size:17px;font-weight:800}
.sec-h a{font-size:13px;font-weight:700;color:var(--coral-deep)}

/* ---------- growth week selector ---------- */
.weeknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.weeknav button{width:40px;height:40px;border-radius:50%;border:none;background:var(--surface);
  box-shadow:var(--shadow-soft);color:var(--coral-deep);font-size:18px;display:grid;place-items:center}
.weeknav button:disabled{opacity:.35}
.weeknav .wk{font-family:var(--display);font-weight:900;font-size:20px}
.scrubber{display:flex;gap:8px;overflow-x:auto;padding:2px 0 14px;scrollbar-width:none;margin:0 -20px;padding-left:20px;padding-right:20px}
.scrubber::-webkit-scrollbar{display:none}
.wkpill{flex:none;min-width:48px;height:48px;border-radius:16px;border:none;background:var(--surface);
  box-shadow:var(--shadow-soft);font-family:var(--display);font-weight:800;color:var(--muted);
  display:grid;place-items:center;font-size:15px;transition:transform .2s ease}
.wkpill.active{background:var(--coral);color:#fff;transform:scale(1.04)}

.baby-card{background:linear-gradient(160deg,#FFFFFF,#F3ECFB);border-radius:var(--r-lg);
  padding:24px;text-align:center;box-shadow:var(--shadow-soft);margin-bottom:16px}
.baby-card h2{font-size:22px;font-weight:800;margin:14px 0 4px}
.stats{display:flex;gap:10px;margin-top:16px}
.stat{flex:1;background:rgba(255,255,255,.7);border-radius:16px;padding:12px}
.stat b{font-family:var(--display);font-weight:900;font-size:18px;display:block}
.stat span{font-size:11px;color:var(--muted)}

.info{background:var(--surface);border-radius:var(--r-md);padding:16px 18px;box-shadow:var(--shadow-soft);margin-bottom:12px;display:flex;gap:13px}
.info .dot{width:38px;height:38px;border-radius:12px;flex:none;display:grid;place-items:center}
.info h3{font-size:15px;font-weight:800;margin-bottom:3px}
.info p{font-size:13px;color:var(--muted)}

/* ---------- appointments ---------- */
.appt{display:flex;gap:14px;align-items:flex-start}
.datecard{flex:none;width:58px;border-radius:16px;overflow:hidden;text-align:center;box-shadow:var(--shadow-soft)}
.datecard .m{background:var(--coral);color:#fff;font-family:var(--display);font-weight:800;font-size:11px;letter-spacing:.1em;padding:5px}
.datecard .d{background:#fff;font-family:var(--display);font-weight:900;font-size:24px;padding:8px 0}
.appt h3{font-size:17px;font-weight:800}
.appt .when{font-size:13px;color:var(--coral-deep);font-weight:700;margin:3px 0}
.note{background:var(--coral-soft);color:var(--coral-deep);border-radius:14px;padding:10px 12px;font-size:12.5px;font-weight:600;margin-top:12px}
.empty{text-align:center;padding:30px 18px}
.empty .ico{font-size:34px}
.empty h3{font-size:16px;font-weight:800;margin:10px 0 4px}
.empty p{font-size:13px;color:var(--muted)}

/* ---------- kicks ---------- */
.kick-stage{text-align:center;padding:8px 0 0}
.timer{font-family:var(--display);font-weight:800;font-size:18px;color:var(--muted);letter-spacing:.04em}
.kickcount{font-family:var(--display);font-weight:900;font-size:15px;color:var(--coral-deep);margin-top:4px}
.kick-btn{position:relative;width:210px;height:210px;border-radius:50%;border:none;margin:24px auto;
  background:radial-gradient(circle at 38% 32%,#F9A097,var(--coral) 55%,var(--coral-deep));
  color:#fff;font-family:var(--display);font-weight:800;font-size:20px;
  box-shadow:0 26px 50px -16px rgba(225,91,106,.7), inset 0 -8px 20px rgba(160,40,55,.4);
  display:grid;place-items:center;transition:transform .12s ease}
.kick-btn:active{transform:scale(.94)}
.kick-btn .big{font-size:40px;font-weight:900;line-height:1}
.kick-btn .lbl{font-size:13px;font-weight:700;opacity:.92;margin-top:4px}
.kick-btn::after{content:"";position:absolute;inset:0;border-radius:50%;border:3px solid rgba(255,255,255,.5);
  opacity:0;pointer-events:none}
.kick-btn.pulse::after{animation:ripple .6s ease-out}
@keyframes ripple{0%{opacity:.7;transform:scale(.85)}100%{opacity:0;transform:scale(1.25)}}
.kick-actions{display:flex;gap:12px;margin-top:6px}
.kick-actions button{flex:1;border:none;background:var(--surface);box-shadow:var(--shadow-soft);
  border-radius:16px;padding:14px;font-family:var(--display);font-weight:800;color:var(--plum)}

/* ---------- ask ai ---------- */
.ai-card{background:linear-gradient(150deg,var(--lavender-soft),#fff);border-radius:var(--r-md);padding:18px;box-shadow:var(--shadow-soft);margin-bottom:14px;display:flex;gap:12px;align-items:flex-start}
.ai-card .bot{width:40px;height:40px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:20px;background:var(--lavender)}
.ai-card p{font-size:13.5px;color:var(--plum)}
.chips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:16px}
.chips button{background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-size:12.5px;font-weight:600;color:var(--plum);box-shadow:var(--shadow-soft)}
.chat{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.bubble{max-width:82%;padding:12px 15px;border-radius:20px;font-size:13.5px;line-height:1.4}
.bubble.ai{background:var(--surface);box-shadow:var(--shadow-soft);align-self:flex-start;border-bottom-left-radius:6px}
.bubble.user{background:var(--coral);color:#fff;align-self:flex-end;border-bottom-right-radius:6px}
.composer{display:flex;gap:8px;background:var(--surface);border-radius:999px;padding:7px 7px 7px 16px;box-shadow:var(--shadow-soft);align-items:center}
.composer input{flex:1;border:none;background:transparent;outline:none;font-family:var(--body);font-size:14px;color:var(--plum)}
.composer input::placeholder{color:var(--muted)}
.composer .send{width:40px;height:40px;border-radius:50%;border:none;background:var(--coral);color:#fff;display:grid;place-items:center}
.disclaimer{font-size:11px;color:var(--muted);margin-top:14px;line-height:1.5;text-align:center}

/* ---------- bottom nav ---------- */
.nav{position:absolute;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(5,1fr);
  background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);
  padding:9px 6px calc(env(safe-area-inset-bottom,0px) + 16px);z-index:20}
.nav button{border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:4px;
  color:var(--muted);font-family:var(--display);font-weight:700;font-size:10px;padding:5px 0;transition:color .2s ease}
.nav button .pip{width:26px;height:26px;display:grid;place-items:center;border-radius:10px;transition:background .25s ease}
.nav button.active{color:var(--coral-deep)}
.nav button.active .pip{background:var(--coral-soft)}

@media (prefers-reduced-motion: reduce){
  *{animation:none !important;scroll-behavior:auto}
  .tap:active,.btn:hover,.kick-btn:active,.site-back:hover{transform:none}
}
@media (max-width:440px){
  .stage{padding:0}
  .phone{max-width:none;height:100vh;border-radius:0;box-shadow:none}
  .island{display:none}
  .screen{padding-top:24px}
  .site-back{top:auto;bottom:calc(env(safe-area-inset-bottom,0px) + 86px)}
}
</style>
</head>
<body>
<a class="site-back" href="index.html#apps">← MoonLeaf Studio</a>

<div id="root"></div>

<noscript>This interactive mockup needs JavaScript enabled.</noscript>

<script type="text/babel" data-presets="react">
const { useState } = React;

/* ---------------- data ---------------- */
const WEEK_DATA = {
  20:{size:"a banana",length:"25 cm",weight:"300 g"},
  22:{size:"a papaya",length:"28 cm",weight:"430 g"},
  23:{size:"a grapefruit",length:"29 cm",weight:"500 g"},
  24:{size:"an ear of corn",length:"30 cm",weight:"600 g"},
  25:{size:"a rutabaga",length:"34 cm",weight:"660 g"},
  26:{size:"a head of lettuce",length:"35 cm",weight:"760 g"},
  28:{size:"an eggplant",length:"37 cm",weight:"1.0 kg"},
};
function weekData(w){
  if(WEEK_DATA[w]) return WEEK_DATA[w];
  // nearest known week as a friendly fallback
  const keys=Object.keys(WEEK_DATA).map(Number);
  const near=keys.reduce((a,b)=>Math.abs(b-w)<Math.abs(a-w)?b:a,keys[0]);
  return WEEK_DATA[near];
}
const MIN_WEEK=16, MAX_WEEK=40;

/* ---------------- icons ---------------- */
function Icon({name,size=24}){
  const s={width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",
    strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"};
  const p={
    home:<path d="M3 10.5 12 4l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/>,
    growth:<g><path d="M12 21c0-6 0-9 5-12"/><path d="M17 4c-5 0-8 3-8 7 4 0 7-3 7-7z"/><path d="M12 21c0-4-1-6-5-8"/></g>,
    calendar:<g><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 9h18M8 3v4M16 3v4"/></g>,
    baby:<g><circle cx="12" cy="7" r="3"/><path d="M6 21c0-4 3-7 6-7s6 3 6 7"/><path d="M9 10c1 1 5 1 6 0"/></g>,
    chat:<path d="M4 5h16a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H9l-4 4V6a1 1 0 0 1 1-1z"/>,
    chevron:<path d="M9 6l6 6-6 6"/>,
    send:<path d="M4 12l16-7-7 16-2-6-7-3z"/>,
  };
  return <svg {...s}>{p[name]}</svg>;
}

/* baby illustration inside the ring */
function BabySprout({size=58}){
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" aria-hidden="true">
      <defs>
        <radialGradient id="bg" cx="38%" cy="32%" r="70%">
          <stop offset="0" stopColor="#FFE3D6"/><stop offset="1" stopColor="#F7A89C"/>
        </radialGradient>
      </defs>
      <circle cx="32" cy="34" r="20" fill="url(#bg)"/>
      {/* curled baby */}
      <path d="M24 30c0-6 5-10 11-9 4 .6 6 4 5 7-1 4-5 5-5 9 0 3 3 4 3 7" fill="none" stroke="#C9605C" strokeWidth="2.4" strokeLinecap="round"/>
      <circle cx="26.5" cy="29.5" r="2" fill="#C9605C"/>
    </svg>
  );
}

/* progress ring wrapping the baby */
function BabyRing({week,size=120}){
  const stroke=10, r=(size-stroke)/2, c=2*Math.PI*r;
  const pct=Math.min(1,Math.max(0,(week)/40));
  return (
    <div className="ring-wrap" style={{width:size,height:size}}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#F2E2DB" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#F4796B" strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c*(1-pct)}
          transform={`rotate(-90 ${size/2} ${size/2})`}/>
      </svg>
      <div style={{position:"absolute",display:"grid",placeItems:"center"}}>
        <BabySprout size={size*0.46}/>
      </div>
    </div>
  );
}

/* ---------------- screens ---------------- */
function Home({setTab,week}){
  const d=weekData(week);
  const stories=[["Today","🌅"],["Symptoms","📝"],["Sleep","😴"],["Mood","💗"],["Weight","⚖️"]];
  return (
    <div className="screen">
      <div className="top">
        <div>
          <div className="hello">Good morning</div>
          <div className="name">Hi, Maya 🌸</div>
        </div>
        <div className="avatar">🌸</div>
      </div>

      <div className="stories">
        {stories.map(([t,e])=>(
          <button className="story" key={t}>
            <span className="ring"><span className="face">{e}</span></span>
            <span>{t}</span>
          </button>
        ))}
      </div>

      <div className="hero">
        <span className="pill">Week {week}</span>
        <div className="hero-row">
          <div className="ring-wrap" style={{width:96,height:96}}>
            <BabyRing week={week} size={96}/>
          </div>
          <div className="hero-copy">
            <h2>Baby is the size of {d.size}</h2>
            <p>{d.length} · {d.weight} · 16 weeks to go</p>
          </div>
        </div>
        <button className="btn block" onClick={()=>setTab("Growth")}>View this week</button>
      </div>

      <div className="sec-h"><h3>For you today</h3></div>

      <FeedCard accent="--coral-soft" icon="💧" title="Today's tip"
        text="Sip water through the day and rest when you feel tired."/>
      <FeedCard accent="--lavender-soft" icon="📅" title="Next appointment"
        text="OB checkup · Jun 24, 10:30 AM" onClick={()=>setTab("Appointments")}/>
      <FeedCard accent="--mint-soft" icon="📝" title="Log symptoms"
        text="Track nausea, mood, sleep, or pain."/>
      <FeedCard accent="--coral-soft" icon="👣" title="Kick counter"
        text="Start a movement session." onClick={()=>setTab("Kicks")}/>
    </div>
  );
}

function FeedCard({accent,icon,title,text,onClick}){
  return (
    <div className={"card feed-card"+(onClick?" tap":"")} onClick={onClick}
      role={onClick?"button":undefined} tabIndex={onClick?0:undefined}
      onKeyDown={onClick?(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();onClick();}}:undefined}>
      <div className="cover" style={{background:`var(${accent})`,fontSize:24}}>{icon}</div>
      <div>
        <h3>{title}</h3>
        <p>{text}</p>
      </div>
      {onClick && <span className="chev"><Icon name="chevron" size={18}/></span>}
    </div>
  );
}

function Growth({week,setWeek}){
  const d=weekData(week);
  const pills=[];
  for(let w=Math.max(MIN_WEEK,week-3);w<=Math.min(MAX_WEEK,week+4);w++) pills.push(w);
  const infos=[
    ["🫁","Baby development","The lungs and senses are developing quickly this week."],
    ["🤰","Your body","You may feel stronger kicks, some back pain, and more tiredness."],
    ["🩺","Ask your doctor","Bring up glucose screening and your baby's movement patterns."],
    ["🥗","Nutrition","Lean on protein, iron-rich foods, fruit, and plenty of water."],
  ];
  return (
    <div className="screen">
      <div className="weeknav">
        <button onClick={()=>setWeek(week-1)} disabled={week<=MIN_WEEK} aria-label="Previous week">‹</button>
        <span className="wk">Week {week}</span>
        <button onClick={()=>setWeek(week+1)} disabled={week>=MAX_WEEK} aria-label="Next week">›</button>
      </div>

      <div className="scrubber">
        {pills.map(w=>(
          <button key={w} className={"wkpill"+(w===week?" active":"")} onClick={()=>setWeek(w)}>{w}</button>
        ))}
      </div>

      <div className="baby-card">
        <div style={{display:"grid",placeItems:"center"}}><BabyRing week={week} size={150}/></div>
        <h2>Size of {d.size}</h2>
        <p className="muted" style={{fontSize:13}}>Week {week} of 40</p>
        <div className="stats">
          <div className="stat"><b>{d.length}</b><span>length</span></div>
          <div className="stat"><b>{d.weight}</b><span>weight</span></div>
          <div className="stat"><b>{40-week}</b><span>weeks to go</span></div>
        </div>
      </div>

      {infos.map(([e,t,x])=>(
        <div className="info" key={t}>
          <div className="dot" style={{background:"var(--coral-soft)",fontSize:18}}>{e}</div>
          <div><h3>{t}</h3><p>{x}</p></div>
        </div>
      ))}
    </div>
  );
}

function Appointments(){
  return (
    <div className="screen">
      <div className="sec-h" style={{margin:"0 2px 16px"}}>
        <h1 className="title" style={{margin:0}}>Appointments</h1>
        <button className="btn ghost" style={{padding:"9px 14px"}}>+ Add</button>
      </div>

      <div className="card">
        <div className="appt">
          <div className="datecard"><div className="m">JUN</div><div className="d">24</div></div>
          <div>
            <h3>OB visit</h3>
            <div className="when">10:30 AM</div>
            <p className="muted" style={{fontSize:13}}>Women's Health Clinic</p>
          </div>
        </div>
        <div className="note">Ask about your glucose test.</div>
      </div>

      <div className="card empty">
        <div className="ico">📅</div>
        <h3>No other appointments</h3>
        <p>Add your next prenatal visit to see it here.</p>
      </div>
    </div>
  );
}

function Kicks({kicks,setKicks}){
  const [pulse,setPulse]=useState(false);
  const tap=()=>{setKicks(kicks+1);setPulse(true);};
  return (
    <div className="screen">
      <h1 className="title">Kick counter</h1>
      <div className="card kick-stage">
        <div className="timer">00:18:42</div>
        <div className="kickcount">{kicks} {kicks===1?"kick":"kicks"} this session</div>
        <button className={"kick-btn"+(pulse?" pulse":"")} onClick={tap}
          onAnimationEnd={()=>setPulse(false)}>
          <span style={{display:"grid",placeItems:"center"}}>
            <span className="big">{kicks}</span>
            <span className="lbl">Tap for a kick</span>
          </span>
        </button>
        <div className="kick-actions">
          <button>Pause</button>
          <button>Save session</button>
        </div>
      </div>
      <div className="info">
        <div className="dot" style={{background:"var(--mint-soft)",fontSize:18}}>💡</div>
        <div>
          <h3>Movement reminder</h3>
          <p>Many parents time how long 10 movements take. Call your provider if movement feels reduced.</p>
        </div>
      </div>
    </div>
  );
}

function AskAI(){
  const chips=["Is this symptom normal?","Foods for nausea?","Questions for my doctor?","When should I call?"];
  return (
    <div className="screen">
      <h1 className="title">Ask Eviva</h1>

      <div className="ai-card">
        <div className="bot">🌸</div>
        <p>Ask about symptoms, nutrition, appointments, or what to bring up with your doctor.</p>
      </div>

      <div className="chips">
        {chips.map(c=><button key={c}>{c}</button>)}
      </div>

      <div className="chat">
        <div className="bubble ai">Hi, I'm Eviva. How can I help today?</div>
        <div className="bubble user">What should I ask at my next visit?</div>
        <div className="bubble ai">Great question — bring up your glucose screening, your baby's movement, and any swelling or headaches you've noticed.</div>
      </div>

      <div className="composer">
        <input placeholder="Ask a pregnancy question…" aria-label="Ask a pregnancy question"/>
        <button className="send" aria-label="Send"><Icon name="send" size={18}/></button>
      </div>

      <p className="disclaimer">Eviva offers guidance, not medical advice. For urgent concerns, contact your healthcare provider.</p>
    </div>
  );
}

/* ---------------- nav + shell ---------------- */
function BottomNav({tab,setTab}){
  const tabs=[["Home","home"],["Growth","growth"],["Appointments","calendar"],["Kicks","baby"],["Ask AI","chat"]];
  const label={Home:"Home",Growth:"Growth",Appointments:"Visits",Kicks:"Kicks","Ask AI":"Ask"};
  return (
    <nav className="nav">
      {tabs.map(([t,ic])=>(
        <button key={t} className={tab===t?"active":""} onClick={()=>setTab(t)} aria-current={tab===t?"page":undefined}>
          <span className="pip"><Icon name={ic} size={21}/></span>
          {label[t]}
        </button>
      ))}
    </nav>
  );
}

function App(){
  const [tab,setTab]=useState("Home");
  const [kicks,setKicks]=useState(0);
  const [week,setWeek]=useState(24);
  const clampWeek=(w)=>setWeek(Math.min(MAX_WEEK,Math.max(MIN_WEEK,w)));
  return (
    <div className="stage">
      <div className="phone">
        <div className="island" aria-hidden="true"></div>
        <div className="viewport">
          {tab==="Home" && <Home setTab={setTab} week={week}/>}
          {tab==="Growth" && <Growth week={week} setWeek={clampWeek}/>}
          {tab==="Appointments" && <Appointments/>}
          {tab==="Kicks" && <Kicks kicks={kicks} setKicks={setKicks}/>}
          {tab==="Ask AI" && <AskAI/>}
        </div>
        <BottomNav tab={tab} setTab={setTab}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
